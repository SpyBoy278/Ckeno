<!DOCTYPE html>
<html>
<head>
  <title>Fast Keno</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .number-btn { margin: 2px; padding: 8px; }
    .selected { background: gold; }
    .drawn { background: lightgreen; }
    .timer { font-size: 24px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [ws, setWs] = useState(null);
      const [picks, setPicks] = useState([]);
      const [roundId, setRoundId] = useState(null);
      const [status, setStatus] = useState('accepting');
      const [drawn, setDrawn] = useState([]);
      const [timeLeft, setTimeLeft] = useState(60);
      const [lastWin, setLastWin] = useState(null);
      const [playerCount, setPlayerCount] = useState(0);
      const timerRef = useRef(null);

      useEffect(() => {
        const socket = new WebSocket('ws://localhost:3000');
        setWs(socket);

        socket.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'newRound') {
            setRoundId(msg.roundId);
            setStatus('accepting');
            setDrawn([]);
            setLastWin(null);
            setTimeLeft(Math.round(msg.timeLeft / 1000));
            startLocalTimer(msg.timeLeft);
            setPicks([]);
          } else if (msg.type === 'statusChange') {
            setStatus(msg.status);
            clearInterval(timerRef.current);
          } else if (msg.type === 'drawResult') {
            setDrawn(msg.drawnNumbers);
            setStatus('finished');
          } else if (msg.type === 'youWon') {
            setLastWin({ matches: msg.matches, amount: msg.winAmount });
          } else if (msg.type === 'playerCount') {
            setPlayerCount(msg.count);
          } else if (msg.type === 'error') {
            alert(msg.message);
          }
        };

        return () => socket.close();
      }, []);

      function startLocalTimer(durationMs) {
        clearInterval(timerRef.current);
        let remaining = Math.round(durationMs / 1000);
        setTimeLeft(remaining);
        timerRef.current = setInterval(() => {
          remaining -= 1;
          setTimeLeft(remaining);
          if (remaining <= 0) clearInterval(timerRef.current);
        }, 1000);
      }

      function toggleNumber(num) {
        if (status !== 'accepting') return;
        if (picks.includes(num)) {
          setPicks(picks.filter(p => p !== num));
        } else if (picks.length < 10) {
          setPicks([...picks, num].sort((a,b)=>a-b));
        }
      }

      function placeBet() {
        if (ws && picks.length > 0 && status === 'accepting') {
          ws.send(JSON.stringify({ type: 'placeBet', picks, betAmount: 10 }));
        }
      }

      return (
        <div>
          <h1>Fast Keno</h1>
          <div>Round {roundId} | Status: {status}</div>
          {status === 'accepting' && <div className="timer">Next draw: {timeLeft}s</div>}
          <div>Players in this round: {playerCount}</div>
          <div>
            <strong>Your picks:</strong> {picks.join(', ') || 'None'}
          </div>
          <div>
            {Array.from({length:80}, (_,i)=>i+1).map(n => (
              <button
                key={n}
                className={`number-btn ${picks.includes(n) ? 'selected' : ''} ${drawn.includes(n) ? 'drawn' : ''}`}
                onClick={() => toggleNumber(n)}
                disabled={status !== 'accepting'}
              >
                {n}
              </button>
            ))}
          </div>
          <button onClick={placeBet} disabled={status !== 'accepting' || picks.length === 0}>
            Place Bet (10 Birr)
          </button>
          {lastWin && (
            <div style={{color:'green', fontSize:'20px'}}>
              You won {lastWin.amount} Birr! ({lastWin.matches} matches)
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ETHIO FAST KENO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a1128; color: #fff; font-family: Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px; min-height: 100vh;
    }
    .game-box {
      width: 100%; max-width: 450px; background: #0d1b3e;
      border-radius: 18px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border: 1px solid #1e2d50; position: relative;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; color: #f5c542; font-weight: bold;
    }
    .title { font-size: 1.5rem; letter-spacing: 1px; text-shadow: 0 0 8px rgba(245,197,66,0.3); }
    .balance { font-size: 1.3rem; color: #f5c542; }
    .sub-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .draw-id { color: #e0e0e0; font-size: 0.9rem; }
    .timer-box {
      background: #000; color: #f5c542; font-size: 1.8rem; font-weight: bold;
      padding: 4px 12px; border-radius: 8px; border: 1px solid #f5c542;
    }
    .hot-wrap { margin-bottom: 6px; font-size: 0.85rem; color: #f5c542; }
    .hot-numbers { font-weight: bold; }
    .paytable {
      background: #0a1128; border-radius: 8px; padding: 8px; margin-bottom: 10px;
      font-size: 0.8rem; color: #ccc; display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap;
    }
    .paytable span { margin-right: 10px; }
    .possible-win { color: #f5c542; font-weight: bold; }
    .grid {
      display: grid; grid-template-columns: repeat(10, 1fr);
      gap: 4px; margin: 12px 0; background: #0a1128; padding: 8px; border-radius: 10px;
    }
    .cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      background: #152044; border-radius: 5px; font-weight: bold;
      cursor: pointer; transition: 0.15s; border: 1px solid #25335a;
      color: #ddd; font-size: 0.9rem;
    }
    .cell:hover { background: #1f2d5a; border-color: #f5c542; }
    .cell.selected { background: #f5c542; color: #000; border-color: #fff; box-shadow: 0 0 10px #f5c542; }
    .cell.win { background: #2ea043; color: #fff; border-color: #fff; }
    .cell.lose { background: #da3633; color: #fff; }
    .bet-area {
      display: flex; align-items: center; gap: 8px; margin: 10px 0;
    }
    .bet-ctrl {
      display: flex; align-items: center; background: #0a1128; border-radius: 8px;
      border: 1px solid #25335a; overflow: hidden;
    }
    .bet-ctrl button {
      background: transparent; border: none; color: #f5c542; font-size: 1.4rem;
      padding: 8px 12px; cursor: pointer;
    }
    .bet-amount {
      width: 50px; text-align: center; font-size: 1rem; color: #fff; font-weight: bold;
    }
    .btn-play {
      flex: 1; background: linear-gradient(180deg, #f5c542 0%, #d4a017 100%);
      border: none; border-radius: 10px; padding: 14px; color: #000;
      font-weight: bold; font-size: 1.1rem; text-transform: uppercase;
      cursor: pointer; letter-spacing: 1px; box-shadow: 0 0 10px rgba(245,197,66,0.5);
    }
    .btn-play:disabled { opacity: 0.6; box-shadow: none; cursor: not-allowed; }
    .ticket-status {
      margin-top: 6px; font-size: 0.9rem; color: #f5c542; text-align: center;
    }
    .social-feed {
      background: #0a1128; border-radius: 8px; padding: 8px; margin-top: 8px;
      max-height: 80px; overflow-y: auto; font-size: 0.7rem; color: #aaa;
    }
    .social-feed div { margin-bottom: 2px; }
    .tabs {
      display: flex; gap: 5px; margin-top: 14px;
    }
    .tab {
      flex: 1; padding: 10px 0; text-align: center; background: #152044;
      border-radius: 8px; font-size: 0.8rem; color: #888; font-weight: bold;
      cursor: pointer;
    }
    .tab.active { background: #f5c542; color: #000; }
    /* View containers */
    .view { display: none; }
    .view.active { display: block; }
    .history-table {
      width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px;
    }
    .history-table td, .history-table th {
      padding: 5px; border-bottom: 1px solid #25335a; vertical-align: top;
    }
    .stat-grid {
      display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 10px;
    }
    .stat-cell {
      text-align: center; padding: 4px; background: #152044; border-radius: 4px;
      font-size: 0.7rem;
    }
    .stat-cell .freq { color: #f5c542; font-weight: bold; }
    .leaders-list { margin-top: 10px; }
    .leaders-list div {
      display: flex; justify-content: space-between; padding: 5px 0;
      border-bottom: 1px solid #25335a; font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="game-box">
    <!-- Header -->
    <div class="header">
      <span class="title">FAST KENO</span>
      <span class="balance" id="balanceDisplay">995.00 ETB</span>
    </div>

    <!-- Draw ID + Timer -->
    <div class="sub-header">
      <span class="draw-id">ID: <span id="drawId">233987</span></span>
      <span class="timer-box" id="timer">00:30</span>
    </div>

    <!-- Hot numbers -->
    <div class="hot-wrap">
      🔥 <span class="hot-numbers" id="hotNumbers">—</span>
    </div>

    <!-- Paytable & possible win -->
    <div class="paytable" id="paytableDisplay">
      <span>Match 0-10: see pays</span>
      <span class="possible-win">Possible win: <span id="possibleWin">0</span> ETB</span>
    </div>

    <!-- Views -->
    <!-- PLAY VIEW -->
    <div id="playView" class="view active">
      <div class="grid" id="kenoGrid"></div>

      <div class="bet-area">
        <div class="bet-ctrl">
          <button id="betMinus">−</button>
          <div class="bet-amount" id="betAmount">5.00</div>
          <button id="betPlus">+</button>
        </div>
        <button id="btnPlay" class="btn-play">START GAME</button>
      </div>
      <div class="ticket-status" id="ticketStatus"></div>

      <!-- Social feed (other players) -->
      <div class="social-feed" id="socialFeed">
        <div>Loading other players...</div>
      </div>
    </div>

    <!-- HISTORY VIEW -->
    <div id="historyView" class="view">
      <h3 style="color:#f5c542; margin-bottom:8px;">Draw History</h3>
      <table class="history-table" id="historyTable"></table>
    </div>

    <!-- STATISTICS VIEW -->
    <div id="statsView" class="view">
      <h3 style="color:#f5c542; margin-bottom:8px;">Number Frequency (last 100 draws)</h3>
      <div class="stat-grid" id="statGrid"></div>
    </div>

    <!-- LEADERS VIEW -->
    <div id="leadersView" class="view">
      <h3 style="color:#f5c542; margin-bottom:8px;">🏆 Today's Leaders</h3>
      <div class="leaders-list" id="leadersList"></div>
    </div>

    <!-- Bottom tabs -->
    <div class="tabs">
      <div class="tab active" data-view="playView">GAME</div>
      <div class="tab" data-view="historyView">HISTORY</div>
      <div class="tab" data-view="statsView">STATS</div>
      <div class="tab" data-view="leadersView">LEADERS</div>
    </div>
  </div>

  <script>
    // ---------- Configuration ----------
    const TOTAL_NUM = 80;
    const DRAW_COUNT = 20;
    const MAX_PICK = 10;
    const START_COUNTDOWN = 30; // seconds

    // Paytables for each number of picks (index = picks count, array index = matches)
    // Multipliers: [0 matches, 1 match, ..., picks matches]
    const PAYTABLES = {
      1: [0, 2],
      2: [0, 0, 5],
      3: [0, 0, 2, 50],
      4: [0, 0, 1, 5, 100],
      5: [0, 0, 0, 2, 20, 500],
      6: [0, 0, 0, 2, 10, 100, 1000],
      7: [0, 0, 0, 1, 5, 30, 300, 5000],
      8: [0, 0, 0, 0, 5, 20, 100, 1000, 10000],
      9: [0, 0, 0, 0, 2, 10, 50, 500, 5000, 20000],
      10: [2, 0, 0, 0, 0, 5, 30, 100, 300, 2000, 10000] // special: 0 matches pays x2
    };

    // ---------- State ----------
    let balance = 995.00;
    let selectedNumbers = new Set();
    let betAmount = 5;
    let countdown = START_COUNTDOWN;
    let currentDrawId = 233987;
    let timerInterval = null;
    let ticketPlaced = false;     // if player has bet for this round
    let ticketNumbers = [];       // numbers locked in for ticket
    let ticketBetAmount = 0;
    let drawHistory = [];         // array of {id, numbers (20), timestamp}
    let frequency = new Array(TOTAL_NUM + 1).fill(0); // index 1-80
    let drawCountForStats = 0;

    // DOM elements
    const gridEl = document.getElementById('kenoGrid');
    const balanceEl = document.getElementById('balanceDisplay');
    const timerEl = document.getElementById('timer');
    const drawIdEl = document.getElementById('drawId');
    const hotEl = document.getElementById('hotNumbers');
    const paytableEl = document.getElementById('paytableDisplay');
    const possibleWinEl = document.getElementById('possibleWin');
    const betAmountEl = document.getElementById('betAmount');
    const btnPlay = document.getElementById('btnPlay');
    const ticketStatusEl = document.getElementById('ticketStatus');
    const socialFeedEl = document.getElementById('socialFeed');
    const historyTableEl = document.getElementById('historyTable');
    const statGridEl = document.getElementById('statGrid');

    // ---------- View switching ----------
    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-view="${viewId}"]`).classList.add('active');
    }
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchView(tab.dataset.view));
    });

    // ---------- Grid generation ----------
    function buildGrid() {
      gridEl.innerHTML = '';
      for (let i = 1; i <= TOTAL_NUM; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = i;
        cell.dataset.number = i;
        cell.addEventListener('click', () => onCellClick(i, cell));
        gridEl.appendChild(cell);
      }
    }

    function onCellClick(num, cell) {
      if (ticketPlaced) {
        alert('You already have a ticket for this draw. Wait for the next round.');
        return;
      }
      if (selectedNumbers.has(num)) {
        selectedNumbers.delete(num);
        cell.classList.remove('selected');
      } else {
        if (selectedNumbers.size >= MAX_PICK) {
          alert(`You can select up to ${MAX_PICK} numbers.`);
          return;
        }
        selectedNumbers.add(num);
        cell.classList.add('selected');
      }
      updatePaytableAndPossibleWin();
    }

    function clearSelection() {
      selectedNumbers.clear();
      document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
      updatePaytableAndPossibleWin();
    }

    // ---------- Paytable display ----------
    function updatePaytableAndPossibleWin() {
      const picks = selectedNumbers.size;
      if (picks === 0) {
        paytableEl.innerHTML = `<span>Select numbers to see payouts</span>`;
        possibleWinEl.textContent = '0';
        return;
      }
      const paytable = PAYTABLES[picks];
      if (!paytable) return;
      let html = '';
      for (let m = 0; m <= picks; m++) {
        if (paytable[m] > 0) {
          html += `<span>Match ${m}: x${paytable[m]}</span>`;
        }
      }
      const maxMult = paytable[picks];
      const maxWin = maxMult * betAmount;
      paytableEl.innerHTML = html + `<span class="possible-win">Possible win: <span id="possibleWin">${maxWin.toFixed(2)}</span> ETB</span>`;
      possibleWinEl.textContent = maxWin.toFixed(2);
    }

    // ---------- Bet adjustment ----------
    function updateBetDisplay() {
      betAmountEl.textContent = betAmount.toFixed(2);
      updatePaytableAndPossibleWin();
    }
    document.getElementById('betMinus').addEventListener('click', () => {
      if (ticketPlaced) return;
      betAmount = Math.max(1, betAmount - 5);
      updateBetDisplay();
    });
    document.getElementById('betPlus').addEventListener('click', () => {
      if (ticketPlaced) return;
      betAmount = Math.min(500, betAmount + 5);
      updateBetDisplay();
    });

    // ---------- Timer and draw logic ----------
    function updateDisplay() {
      balanceEl.textContent = `${balance.toFixed(2)} ETB`;
      timerEl.textContent = `00:${countdown.toString().padStart(2, '0')}`;
      drawIdEl.textContent = currentDrawId;
    }

    function generateDraw() {
      const pool = Array.from({length: TOTAL_NUM}, (_, i) => i + 1);
      const drawn = [];
      for (let i = 0; i < DRAW_COUNT; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        drawn.push(pool[idx]);
        pool.splice(idx, 1);
      }
      return drawn.sort((a,b) => a - b);
    }

    function resolveDraw() {
      const drawn = generateDraw();

      // Update frequency stats
      drawn.forEach(n => frequency[n]++);
      drawCountForStats++;

      // Add to history (max 50)
      drawHistory.unshift({
        id: currentDrawId,
        numbers: [...drawn],
        time: new Date().toLocaleTimeString()
      });
      if (drawHistory.length > 50) drawHistory.pop();

      // Handle player ticket
      let resultMessage = '';
      if (ticketPlaced) {
        const matches = ticketNumbers.filter(n => drawn.includes(n)).length;
        const picks = ticketNumbers.length;
        const paytable = PAYTABLES[picks];
        const multiplier = paytable ? paytable[matches] : 0;
        const winAmount = multiplier * ticketBetAmount;
        balance += winAmount; // bet already deducted
        resultMessage = `You matched ${matches}/${picks} — Win: ${winAmount.toFixed(2)} ETB`;
        if (winAmount > 0) {
          balanceEl.textContent = `${balance.toFixed(2)} ETB`;
        }
        // Highlight grid
        document.querySelectorAll('.cell').forEach(cell => {
          const num = parseInt(cell.dataset.number);
          cell.classList.remove('win', 'lose', 'selected');
          if (ticketNumbers.includes(num) && drawn.includes(num)) cell.classList.add('win');
          else if (ticketNumbers.includes(num)) cell.classList.add('lose');
        });
      } else {
        resultMessage = 'No ticket placed this round.';
        // Just clear any highlights
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('win', 'lose', 'selected'));
      }

      // Update hot numbers (first 3 of draw)
      hotEl.textContent = drawn.slice(0,3).join(' ');

      // UI updates
      ticketStatusEl.textContent = resultMessage;
      ticketPlaced = false;
      ticketNumbers = [];
      ticketBetAmount = 0;
      btnPlay.disabled = false;
      btnPlay.textContent = 'START GAME';
      clearSelection(); // clear selection after draw
      updateBetDisplay();

      // Advance draw ID
      currentDrawId++;
      updateDisplay();
      renderHistory();
      renderStats();
      renderSocialFeed();
    }

    function placeBet() {
      if (ticketPlaced) {
        alert('You already have a ticket for this draw.');
        return;
      }
      if (selectedNumbers.size === 0) {
        alert('Select at least one number.');
        return;
      }
      if (balance < betAmount) {
        alert('Insufficient balance.');
        return;
      }
      // Deduct bet
      balance -= betAmount;
      balanceEl.textContent = `${balance.toFixed(2)} ETB`;

      ticketPlaced = true;
      ticketNumbers = Array.from(selectedNumbers);
      ticketBetAmount = betAmount;
      btnPlay.disabled = true;
      btnPlay.textContent = 'WAITING...';
      ticketStatusEl.textContent = 'Ticket placed. Waiting for draw...';
      // Keep numbers highlighted but prevent changes
    }

    // Countdown timer
    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        countdown--;
        updateDisplay();
        if (countdown <= 0) {
          // Time's up – run draw
          resolveDraw();
          countdown = START_COUNTDOWN; // reset for next round
          updateDisplay();
        }
      }, 1000);
    }

    // ---------- History rendering ----------
    function renderHistory() {
      let html = `<tr><th>Draw ID</th><th>Numbers</th><th>Time</th></tr>`;
      drawHistory.forEach(d => {
        const row1 = d.numbers.slice(0,10).join(' ');
        const row2 = d.numbers.slice(10,20).join(' ');
        html += `<tr>
          <td>${d.id}</td>
          <td style="color:#f5c542;">${row1}<br>${row2}</td>
          <td>${d.time}</td>
        </tr>`;
      });
      historyTableEl.innerHTML = html;
    }

    // ---------- Statistics rendering ----------
    function renderStats() {
      let html = '';
      for (let i = 1; i <= TOTAL_NUM; i++) {
        html += `<div class="stat-cell">
          <div>${i}</div>
          <div class="freq">${frequency[i]}</div>
        </div>`;
      }
      statGridEl.innerHTML = html;
    }

    // ---------- Social feed (fake other players) ----------
    function renderSocialFeed() {
      const names = ['e***y','k***p','y***x','m***s','a***b','t***r'];
      const randomName = () => names[Math.floor(Math.random() * names.length)];
      const randomNums = () => {
        const nums = new Set();
        while (nums.size < 3) nums.add(Math.ceil(Math.random() * 80));
        return Array.from(nums).join(' ');
      };
      let html = '';
      for (let i = 0; i < 5; i++) {
        html += `<div>${randomName()} ${randomNums()} Bet: ${(Math.random()*500+100).toFixed(0)} ETB — Waiting</div>`;
      }
      socialFeedEl.innerHTML = html;
    }

    // ---------- Leaderboard (static) ----------
    function renderLeaders() {
      const leaders = [
        {name:'y***v', game:1000, win:30000},
        {name:'y***m', game:1000, win:30000},
        {name:'d***k', game:1000, win:30000},
        {name:'q***w', game:700,  win:30000},
        {name:'x***o', game:1000, win:30000},
        {name:'z***y', game:1000, win:30000},
      ];
      const listEl = document.getElementById('leadersList');
      let html = '';
      leaders.forEach((l,i) => {
        html += `<div><span>#${i+1} ${l.name}</span><span>${l.game} ETB</span><span style="color:#f5c542;">${l.win} ETB</span></div>`;
      });
      listEl.innerHTML = html;
    }

    // ---------- Initial setup ----------
    buildGrid();
    updateBetDisplay();
    updateDisplay();
    renderHistory();
    renderStats();
    renderSocialFeed();
    renderLeaders();
    startTimer();

    // Play button
    btnPlay.addEventListener('click', placeBet);

    // Clear button (we can add a small clear button if needed – keep hidden)
    // But selection can be cleared by clicking a selected number again.
  </script>
</body>
</html>

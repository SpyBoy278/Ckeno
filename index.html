<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fast Keno</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg: #0d0d0d;
            --cell: #2a2a2a;
            --cell-drawn: #1e1e1e;
            --green: #2ecc71;
            --green2: #27ae60;
            --orange: #e67e22;
            --gold: #f0b429;
            --blue: #3498db;
            --red: #e74c3c;
            --dim: #777;
            --text: #fff;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }
        body {
            font-family: 'Roboto', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            background: #0d0d0d;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* HEADER */
        .hdr {
            flex-shrink: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }
        .lf {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 2px;
        }
        .lk {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
        }
        .hdr-r {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .balpill {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            color: #ccc;
        }
        .balpill span {
            font-size: 9px;
            color: var(--dim);
            font-weight: 400;
            margin-left: 2px;
        }
        .idpill {
            background: #0a0a0a;
            border: 1px solid #1a3a1a;
            border-radius: 16px;
            padding: 4px 8px;
            font-size: 9px;
            color: var(--green);
            font-weight: 600;
        }

        /* DRAW AREA */
        .draw-area {
            flex-shrink: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid #1a1a1a;
            position: relative;
        }
        .cd-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 2px;
        }
        .cd {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 3px;
        }
        .dc {
            font-size: 10px;
            color: var(--dim);
        }

        /* DRAWN NUMBERS ROW (shows the drawn balls in normal style) */
        .drawn-numbers-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            width: 100%;
            padding: 4px 0;
            min-height: 36px;
            align-items: center;
        }
        .drawn-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.2s;
        }
        .drawn-num.hit-num {
            background: #0a2a14;
            border-color: var(--green);
            color: var(--green);
        }

        /* TABS */
        .tabs {
            display: flex;
            border-bottom: 1px solid #1a1a1a;
            background: #0a0a0a;
            flex-shrink: 0;
            width: 100%;
            gap: 0;
        }
        .tab {
            flex: 1;
            padding: 9px 1px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
            user-select: none;
            background: transparent;
            letter-spacing: 0.5px;
        }
        .tab.on {
            color: #fff;
            border-bottom-color: var(--green);
        }
        .tab:active {
            background: #111;
            transform: scale(0.96);
        }

        /* MAIN SCROLL */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            background: #0d0d0d;
        }
        .main-scroll::-webkit-scrollbar {
            display: none;
        }

        /* TAB CONTENT */
        .tab-content {
            flex: 1;
        }
        .tabpane {
            display: none;
            padding: 6px 8px;
        }
        .tabpane.on {
            display: block;
        }

        /* GAME TAB - Number Grid */
        .keno-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            padding: 4px 0;
        }
        .cell {
            aspect-ratio: 1;
            border-radius: 6px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: all 0.1s;
        }
        .cell:active {
            transform: scale(0.9);
        }
        .cell.sel {
            background: #0e2a18;
            border-color: var(--green);
            color: var(--green);
        }
        /* Drawn number - NORMAL color (not golden) */
        .cell.dc {
            background: #1a1a1a;
            border-color: #3a3a3a;
            color: #ccc;
        }
        /* Hit/match - green */
        .cell.hc {
            background: #0a2a14;
            border-color: var(--green);
            color: var(--green);
        }
        .cell.fd {
            opacity: 0.35;
        }

        /* BET ROW */
        .bet-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            background: transparent;
        }
        .bbt {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .bval {
            flex: 1;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }
        .bx2 {
            padding: 6px 10px;
            border-radius: 6px;
            background: #0e2a18;
            border: 1px solid var(--green);
            color: var(--green);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }
        .bmax {
            padding: 6px 10px;
            border-radius: 6px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* PLAY BUTTON */
        .play-btn {
            margin: 0;
            padding: 14px;
            border-radius: 8px;
            background: linear-gradient(180deg, #2ecc71 0%, #1a8a42 100%);
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(46, 204, 113, .2);
            transition: all 0.15s;
            width: 100%;
        }
        .play-btn:active {
            transform: scale(0.98);
        }
        .play-btn.dr {
            background: linear-gradient(180deg, #e67e22, #a04000);
        }
        .play-btn.locked {
            background: linear-gradient(180deg, #1a6a35, #0d4020);
        }
        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* HISTORY TAB */
        .h-row {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 5px;
        }
        .h-top {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            font-size: 10px;
        }
        .h-nums-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
        }
        .h-num {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            color: #999;
            border: 1px solid #222;
        }
        .h-num.hh {
            background: #0a2a14;
            color: var(--green);
            border-color: #1a4a2a;
        }

        /* RESULTS TAB */
        .res-round {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
        }
        .res-round-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 10px;
        }
        .res-round-id {
            color: var(--green);
            font-weight: 700;
        }
        .res-round-time {
            color: var(--dim);
        }
        .res-picks {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-bottom: 4px;
        }
        .rpn {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #999;
        }
        .rpn.rw {
            background: #0a2a14;
            border-color: var(--green);
            color: var(--green);
        }
        .res-ft {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 4px;
        }
        .res-drawn {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }
        .rdn {
            font-size: 8px;
            background: #1a1a1a;
            border-radius: 3px;
            padding: 2px 4px;
            color: #999;
        }
        .rdn.rdh {
            background: #0a2a14;
            color: var(--green);
        }

        /* STATISTICS TAB */
        .stats-section {
            margin-bottom: 10px;
        }
        .stats-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
            padding-bottom: 3px;
            border-bottom: 1px solid #1a1a1a;
        }
        .stats-title.hot {
            color: #e74c3c;
        }
        .stats-title.cold {
            color: var(--blue);
        }
        .stats-title.rate {
            color: var(--gold);
        }
        .st-row {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #111;
            border-radius: 4px;
            padding: 4px 6px;
            margin-bottom: 2px;
            font-size: 9px;
        }
        .st-rank {
            color: var(--dim);
            width: 16px;
            text-align: center;
        }
        .st-numball {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .st-numball.hot-ball {
            background: radial-gradient(circle at 35% 28%, #e74c3c, #7a1010 78%);
            color: #fff;
        }
        .st-numball.cold-ball {
            background: radial-gradient(circle at 35% 28%, #3498db, #0a2a5a 78%);
            color: #fff;
        }
        .st-numball.norm-ball {
            background: radial-gradient(circle at 35% 28%, #444, #1a1a1a 78%);
            color: #fff;
        }
        .st-bw {
            flex: 1;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
        }
        .st-bar {
            height: 4px;
            border-radius: 2px;
            transition: width 0.6s;
        }
        .st-bar.hot-bar {
            background: linear-gradient(90deg, #e74c3c, #ff7675);
        }
        .st-bar.cold-bar {
            background: linear-gradient(90deg, #2980b9, #74b9ff);
        }
        .st-count {
            font-size: 9px;
            color: var(--dim);
            width: 20px;
            text-align: right;
        }
        .st-pct {
            font-size: 9px;
            font-weight: 700;
            width: 30px;
            text-align: right;
        }
        .rate-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
        }
        .rate-cell {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            font-weight: 700;
            gap: 0px;
        }
        .rate-cell .rn {
            font-size: 9px;
        }
        .rate-cell .rp {
            font-size: 6px;
        }

        /* LEADERS TAB */
        .leaders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        .leaders-table th {
            background: #111;
            color: var(--dim);
            padding: 6px 4px;
            text-align: left;
            font-weight: 500;
            font-size: 9px;
            border-bottom: 1px solid #1a1a1a;
        }
        .leaders-table td {
            padding: 7px 4px;
            border-bottom: 1px solid #111;
            color: #ccc;
        }
        .leaders-table .l-rank {
            color: var(--dim);
            width: 24px;
            text-align: center;
        }
        .leaders-table .l-name {
            color: #ddd;
        }
        .leaders-table .l-win {
            color: var(--green);
            font-weight: 700;
            text-align: right;
        }
        .leaders-table .l-bet {
            color: var(--dim);
            text-align: center;
        }
        .leaders-table tr.top1 .l-name {
            color: #ffd700;
            font-weight: 700;
        }
        .leaders-table tr.top2 .l-name {
            color: #c0c0c0;
            font-weight: 700;
        }
        .leaders-table tr.top3 .l-name {
            color: #cd7f32;
            font-weight: 700;
        }

        .empty {
            text-align: center;
            color: var(--dim);
            padding: 24px;
            font-size: 11px;
        }
        .section-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--dim);
            text-transform: uppercase;
            margin: 8px 0 4px;
            padding-bottom: 2px;
            border-bottom: 1px solid #1a1a1a;
        }

        /* WIN OVERLAY */
        .winov {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, .9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }
        .winov.on {
            opacity: 1;
            pointer-events: all;
        }
        .wcard {
            background: #0a1e10;
            border: 2px solid var(--green);
            border-radius: 16px;
            padding: 24px 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(46, 204, 113, .35);
            animation: wpop .4s cubic-bezier(.34, 1.56, .64, 1);
        }
        @keyframes wpop {
            0% {
                transform: scale(.5);
            }
            100% {
                transform: scale(1);
            }
        }
        .wl {
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .wa {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--green);
            margin-bottom: 4px;
        }
        .wsu {
            font-size: 11px;
            color: #999;
            margin-bottom: 16px;
        }
        .wok {
            padding: 10px 28px;
            border-radius: 8px;
            border: none;
            background: var(--green2);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- WIN OVERLAY -->
        <div class="winov" id="winov">
            <div class="wcard">
                <div class="wl">YOU WIN</div>
                <div class="wa" id="wamt">0.00</div>
                <div class="wsu" id="wsu2">0 matches</div>
                <button class="wok" onclick="closeWin()">COLLECT</button>
            </div>
        </div>

        <!-- HEADER -->
        <div class="hdr">
            <div class="logo"><span class="lf">FAST</span><span class="lk">KENO</span></div>
            <div class="hdr-r">
                <div class="balpill"><span id="balv">1000.00</span><span>ETB</span></div>
                <div class="idpill">ID: <span id="uid">232166</span></div>
            </div>
        </div>

        <!-- DRAW AREA -->
        <div class="draw-area">
            <div class="cd-row">
                <div class="cd" id="cddisp">00 : 60</div>
                <div class="dc" id="dccnt">0 / 20</div>
            </div>
            <!-- Drawn numbers displayed as normal balls -->
            <div class="drawn-numbers-row" id="drawnNumbersRow">
                <span style="font-size:10px;color:#444;">Waiting for draw...</span>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <div class="tab on" data-t="game" onclick="swTab('game')">GAME</div>
            <div class="tab" data-t="history" onclick="swTab('history')">HISTORY</div>
            <div class="tab" data-t="results" onclick="swTab('results')">RESULTS</div>
            <div class="tab" data-t="stats" onclick="swTab('stats')">STATISTICS</div>
            <div class="tab" data-t="leaders" onclick="swTab('leaders')">LEADERS</div>
        </div>

        <!-- MAIN SCROLL -->
        <div class="main-scroll">
            <div class="tab-content">
                <!-- GAME TAB -->
                <div class="tabpane on" id="tp-game">
                    <div class="keno-grid" id="grid"></div>
                    <div class="bet-row">
                        <div class="bbt" onclick="cbet(-1)">−</div>
                        <div class="bval" id="betdisp">1000</div>
                        <div class="bbt" onclick="cbet(1)">+</div>
                        <div class="bx2" onclick="dobx2()">X2</div>
                        <div class="bmax" onclick="dobmax()">MAX</div>
                    </div>
                    <button class="play-btn" id="playbtn" onclick="manualPlay()">START GAME</button>
                    <div class="section-label" style="margin-top:10px;">My Tickets</div>
                    <div id="ticketlist"></div>
                </div>

                <!-- HISTORY TAB -->
                <div class="tabpane" id="tp-history">
                    <div id="histlist"><div class="empty">No drawing history yet.</div></div>
                </div>

                <!-- RESULTS TAB -->
                <div class="tabpane" id="tp-results">
                    <div id="reslist"><div class="empty">Your ticket results will appear here after each round.</div></div>
                </div>

                <!-- STATISTICS TAB -->
                <div class="tabpane" id="tp-stats">
                    <div id="statslist"><div class="empty">Play rounds to see number statistics.</div></div>
                </div>

                <!-- LEADERS TAB -->
                <div class="tabpane" id="tp-leaders">
                    <div id="leaderslist">
                        <div class="section-label">🏆 Top Winners</div>
                        <div id="leadersTable"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ══════════════════════════
        // PAYTABLE
        // ══════════════════════════
        const PAYS = {
            1: [0, 3],
            2: [0, 0, 12],
            3: [0, 0, 3, 50],
            4: [0, 0, 2, 8, 80],
            5: [0, 0, 0, 4, 20, 200],
            6: [0, 0, 0, 3, 10, 60, 500],
            7: [0, 0, 0, 2, 6, 30, 150, 1000],
            8: [0, 0, 0, 0, 4, 15, 80, 400, 2000],
            9: [0, 0, 0, 0, 2, 8, 40, 200, 800, 5000],
            10: [0, 0, 0, 0, 1, 4, 20, 100, 500, 2000, 10000]
        };

        // ══════════════════════════
        // LEADERS DATA (fake top winners, updated each round)
        // ══════════════════════════
        let leadersData = [];

        function initLeaders() {
            const names = ['y***v', 'y***m', 'd***k', 'q***w', 'x***o', 'z***y', 'b***p', 'k***s', 't***r', 'm***n',
                'a***l', 'h***f', 'r***g', 's***d', 'j***e'
            ];
            leadersData = names.map((name, i) => ({
                name: name,
                bet: [700, 1000, 1000, 1000, 1000, 1000, 500, 800, 1000, 1000, 1000, 500, 1000, 1000, 1000][
                    i
                ],
                win: [30000, 30000, 30000, 30000, 30000, 30000, 15000, 24000, 30000, 20000, 10000, 5000, 30000,
                    30000, 15000
                ][i]
            }));
            leadersData.sort((a, b) => b.win - a.win);
        }

        function updateLeadersAfterRound() {
            // Occasionally add a new winner to the leaderboard
            if (Math.random() < 0.4 && leadersData.length > 0) {
                const newWinner = {
                    name: ['l***x', 'p***q', 'f***c', 'n***h', 'u***y'][Math.floor(Math.random() * 5)],
                    bet: [500, 1000, 1000, 700, 1000][Math.floor(Math.random() * 5)],
                    win: [5000, 10000, 15000, 20000, 30000][Math.floor(Math.random() * 5)]
                };
                leadersData.push(newWinner);
                leadersData.sort((a, b) => b.win - a.win);
                if (leadersData.length > 15) leadersData = leadersData.slice(0, 15);
            }
            renderLeaders();
        }

        function renderLeaders() {
            const el = document.getElementById('leadersTable');
            if (!leadersData.length) { initLeaders(); }
            let html = `<table class="leaders-table">
            <thead><tr><th>#</th><th>ID</th><th>Game</th><th>Win</th></tr></thead><tbody>`;
            leadersData.forEach((l, i) => {
                const rowClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
                html += `<tr class="${rowClass}">
              <td class="l-rank">${i+1}</td>
              <td class="l-name">${l.name}</td>
              <td class="l-bet">${l.bet}</td>
              <td class="l-win">${l.win.toLocaleString()} ETB</td>
            </tr>`;
            });
            html += '</tbody></table>';
            el.innerHTML = html;
        }

        // ══════════════════════════
        // FAKE USERS DATA
        // ══════════════════════════
        const FAKE_NAMES = ['Abebe K.', 'Tigist M.', 'Dawit H.', 'Selam T.', 'Yonas B.', 'Hana G.', 'Biruk A.', 'Meron S.',
            'Kebede L.', 'Almaz W.', 'Fekadu R.', 'Selamawit D.', 'Tesfaye N.', 'Bethlehem F.', 'Girma P.', 'Lidya C.',
            'Samuel J.', 'Eden V.', 'Hailu Q.', 'Rahel Z.'
        ];
        const AVATAR_COLORS = ['#e74c3c', '#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#f39c12', '#2ecc71', '#e91e63',
            '#00bcd4', '#ff5722'
        ];
        const BET_OPTS = [1, 2, 5, 10, 20, 50];

        function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

        function randPicks(n) {
            const p = new Set();
            while (p.size < n) p.add(randInt(1, 80));
            return [...p];
        }

        let fakeUsers = [];

        function genFakeUsers() {
            fakeUsers = [];
            const count = randInt(6, 12);
            const used = new Set();
            for (let i = 0; i < count; i++) {
                let idx;
                do { idx = randInt(0, FAKE_NAMES.length - 1); } while (used.has(idx) && used.size < FAKE_NAMES.length);
                used.add(idx);
                const picks = randInt(1, 10);
                fakeUsers.push({
                    name: FAKE_NAMES[idx],
                    color: AVATAR_COLORS[idx % AVATAR_COLORS.length],
                    initials: FAKE_NAMES[idx].split(' ').map(x => x[0]).join(''),
                    picks: randPicks(picks),
                    bet: BET_OPTS[randInt(0, BET_OPTS.length - 1)],
                    status: 'pending',
                    win: 0,
                    hits: 0
                });
            }
        }

        function scoreFakeUsers(draws) {
            fakeUsers.forEach(u => {
                const hits = u.picks.filter(n => draws.includes(n)).length;
                u.hits = hits;
                const table = PAYS[u.picks.length];
                const mult = (table && table[hits]) || 0;
                u.win = parseFloat((u.bet * mult).toFixed(2));
                u.status = u.win > 0 ? 'win' : 'loss';
            });
        }

        // ══════════════════════════
        // STATE
        // ══════════════════════════
        let bal = 1000,
            bet = 1000;
        let tickets = [],
            activeIdx = 0;
        let draws = [],
            drawing = false;
        let cdVal = 60,
            cdTimer = null;
        let roundId = 232166;
        let histData = [],
            statsMap = {},
            winsTotal = 0;
        const fmt = v => Number(v).toFixed(2);
        const upBal = () => document.getElementById('balv').textContent = fmt(bal);

        // Update the drawn numbers row (normal style balls)
        function updateDrawnNumbersRow() {
            const row = document.getElementById('drawnNumbersRow');
            if (!draws.length) {
                row.innerHTML = '<span style="font-size:10px;color:#444;">Waiting for draw...</span>';
                return;
            }
            const activeTicket = tickets[activeIdx];
            const userPicks = activeTicket ? new Set(activeTicket.picks) : new Set();
            row.innerHTML = draws.map(n => {
                const isHit = userPicks.has(n);
                return `<div class="drawn-num${isHit?' hit-num':''}">${n}</div>`;
            }).join('');
        }

        // ══════════════════════════
        // GRID (8 columns × 10 rows = 80 numbers)
        // ══════════════════════════
        const gridEl = document.getElementById('grid');
        for (let i = 1; i <= 80; i++) {
            const c = document.createElement('div');
            c.className = 'cell';
            c.textContent = i;
            c.dataset.n = i;
            c.addEventListener('click', () => pickNum(i));
            gridEl.appendChild(c);
        }
        const getCell = n => gridEl.querySelector(`[data-n="${n}"]`);

        function pickNum(n) {
            if (drawing) return;
            if (!tickets.length) createTicketSlot();
            const t = tickets[activeIdx];
            if (!t || t.status !== 'pending') return;
            if (t.picks.has(n)) { t.picks.delete(n);
                getCell(n).className = 'cell'; } else { if (t.picks.size >= 10) return;
                t.picks.add(n);
                getCell(n).className = 'cell sel'; }
            renderTickets();
        }

        // ══════════════════════════
        // TICKETS
        // ══════════════════════════
        function createTicketSlot() {
            if (tickets.length >= 10) return;
            tickets.push({ picks: new Set(), betAmt: bet, status: 'pending', hits: 0, win: 0, mult: 0, locked: false });
            activeIdx = tickets.length - 1;
            refreshGrid();
            renderTickets();
        }

        function switchActiveTicket(idx) {
            if (drawing) return;
            activeIdx = idx;
            refreshGrid();
            bet = tickets[idx].betAmt;
            document.getElementById('betdisp').textContent = bet;
        }

        function deleteTicket(idx) {
            if (drawing) return;
            tickets.splice(idx, 1);
            if (!tickets.length) activeIdx = 0;
            else activeIdx = Math.min(activeIdx, tickets.length - 1);
            refreshGrid();
            renderTickets();
        }

        function refreshGrid() {
            for (let i = 1; i <= 80; i++) getCell(i).className = 'cell';
            if (drawing) {
                draws.forEach(n => {
                    const ah = tickets[activeIdx] && tickets[activeIdx].picks.has(n);
                    getCell(n).className = ah ? 'cell hc' : 'cell dc';
                });
                for (let i = 1; i <= 80; i++) {
                    const c = getCell(i);
                    if (!c.classList.contains('dc') && !c.classList.contains('hc')) c.classList.add('fd');
                }
            } else {
                const t = tickets[activeIdx];
                if (t) t.picks.forEach(n => getCell(n).className = 'cell sel');
            }
        }

        function renderTickets() {
            const el = document.getElementById('ticketlist');
            if (!tickets.length) { el.innerHTML =
                    '<div class="empty">Pick numbers then tap START GAME.</div>'; return; }
            el.innerHTML = tickets.map((t, i) => {
                const nums = [...t.picks].sort((a, b) => a - b);
                const isAct = i === activeIdx && !drawing;
                const stCol = t.status === 'win' ? 'var(--green)' : t.status === 'loss' ? 'var(--red)' : t
                    .locked ? 'var(--gold)' : 'var(--dim)';
                const stTxt = t.status === 'win' ? 'WIN' : t.status === 'loss' ? 'LOSS' : t.locked ?
                    'LOCKED' : 'OPEN';
                const cells = [...Array(10)].map((_, j) => {
                    if (j < nums.length) { const hit = t.status !== 'pending' && draws.includes(nums[j]); return `<div class="rpn ${hit?'rw':''}">${nums[j]}</div>`; }
                    return `<div class="rpn" style="background:#0a0a0a;border-color:#111;color:#1a1a1a;">·</div>`;
                }).join('');
                const resText = t.status === 'win' ? `+${fmt(t.win)} ETB` : t.status === 'loss' ? '—' :
                'Waiting';
                const resCol = t.status === 'win' ? 'var(--green)' : t.status === 'loss' ? '#555' :
                'var(--dim)';
                return `<div class="res-round" onclick="switchActiveTicket(${i})" style="cursor:pointer;${isAct?'border-color:var(--green);':''}">
              <div class="res-round-hdr">
                <span class="res-round-id">Ticket ${i+1}</span>
                <span style="color:${stCol};font-weight:700;">${stTxt}</span>
                ${!drawing&&t.status==='pending'?`<button onclick="event.stopPropagation();deleteTicket(${i})" style="background:none;border:none;color:#555;cursor:pointer;font-size:14px;">✕</button>`:''}
              </div>
              <div class="res-picks">${cells}</div>
              <div class="res-ft"><span style="color:var(--dim);">Bet ${t.betAmt}</span><span style="color:${resCol};font-weight:700;">${resText}</span></div>
            </div>`;
            }).join('');
        }

        // ══════════════════════════
        // COUNTDOWN
        // ══════════════════════════
        function startCountdown() {
            clearInterval(cdTimer);
            cdVal = 60;
            updCd();
            genFakeUsers();
            cdTimer = setInterval(() => {
                cdVal--;
                updCd();
                if (cdVal <= 0) { clearInterval(cdTimer);
                    autoStartDraw(); }
            }, 1000);
        }

        function updCd() {
            const s = Math.max(0, cdVal);
            document.getElementById('cddisp').textContent =
                `${String(Math.floor(s/60)).padStart(2,'0')} : ${String(s%60).padStart(2,'0')}`;
        }

        // ══════════════════════════
        // PLAY BUTTON
        // ══════════════════════════
        function manualPlay() {
            if (drawing) return;
            const t = tickets[activeIdx];
            if (!t || t.picks.size === 0) { alert('Pick at least 1 number first!'); return; }
            if (t.status !== 'pending') return;
            if (bal < t.betAmt) { alert('Insufficient balance!'); return; }
            t.locked = true;
            document.getElementById('playbtn').textContent = 'LOCKED ✓';
            document.getElementById('playbtn').classList.add('locked');
            setTimeout(() => {
                document.getElementById('playbtn').textContent = 'START GAME';
                document.getElementById('playbtn').classList.remove('locked');
            }, 1400);
            if (tickets.length < 10) createTicketSlot();
            renderTickets();
        }

        // ══════════════════════════
        // AUTO DRAW
        // ══════════════════════════
        function autoStartDraw() {
            if (drawing) return;
            const hasTickets = tickets.some(t => t.picks.size > 0 && t.locked);
            const totalCost = tickets.filter(t => t.picks.size > 0 && t.locked).reduce((s, t) => s + t.betAmt, 0);
            if (hasTickets && bal < totalCost) { alert('Insufficient balance!');
                startCountdown(); return; }
            if (hasTickets) { bal -= totalCost;
                upBal(); }
            startDraw();
        }

        // ══════════════════════════
        // DRAW
        // ══════════════════════════
        async function startDraw() {
            drawing = true;
            const pb = document.getElementById('playbtn');
            pb.textContent = 'DRAWING...';
            pb.classList.add('dr');
            pb.disabled = true;

            document.getElementById('dccnt').textContent = '0 / 20';
            draws = [];
            updateDrawnNumbersRow();
            refreshGrid();

            const pool = [];
            for (let i = 1; i <= 80; i++) pool.push(i);
            for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]]; }
            draws = pool.slice(0, 20);

            for (let i = 0; i < draws.length; i++) {
                const n = draws[i];
                statsMap[n] = (statsMap[n] || 0) + 1;
                document.getElementById('dccnt').textContent = `${i+1} / 20`;

                if (tickets.some(t => t.locked && t.picks.has(n))) {
                    getCell(n).className = 'cell hc';
                } else {
                    getCell(n).className = 'cell dc';
                }
                for (let j = 1; j <= 80; j++) {
                    const c = getCell(j);
                    if (!c.classList.contains('dc') && !c.classList.contains('hc') && !draws.slice(0, i + 1)
                        .includes(j)) {
                        c.classList.add('fd');
                    }
                }
                updateDrawnNumbersRow();
                await sleep(250);
            }

            // Score
            let totalWin = 0;
            let anyWin = false;
            tickets.forEach(t => {
                if (!t.picks.size || !t.locked) { t.status = 'loss'; return; }
                const hits = [...t.picks].filter(n => draws.includes(n)).length;
                t.hits = hits;
                const table = PAYS[t.picks.size];
                const mult = (table && table[hits]) || 0;
                t.mult = mult;
                t.win = parseFloat((t.betAmt * mult).toFixed(2));
                if (t.win > 0) { t.status = 'win';
                    totalWin += t.win;
                    anyWin = true;
                    winsTotal++; } else t.status = 'loss';
            });
            if (totalWin > 0) { bal += totalWin;
                upBal(); }

            scoreFakeUsers(draws);
            addHistory();
            renderTickets();
            renderHistory();
            renderResults();
            renderStats();
            updateLeadersAfterRound();

            if (anyWin) {
                setTimeout(() => {
                    const best = Math.max(...tickets.map(t => t.win));
                    const bt = tickets.find(t => t.win === best);
                    document.getElementById('wamt').textContent = fmt(best) + ' ETB';
                    document.getElementById('wsu2').textContent =
                        `${bt.hits} of ${bt.picks.size} matched · ${bt.mult}x`;
                    document.getElementById('winov').classList.add('on');
                }, 400);
            }

            setTimeout(() => {
                drawing = false;
                pb.textContent = 'START GAME';
                pb.classList.remove('dr');
                pb.disabled = false;
                tickets = [];
                activeIdx = 0;
                draws = [];
                refreshGrid();
                updateDrawnNumbersRow();
                renderTickets();
                startCountdown();
            }, 2500);
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function closeWin() { document.getElementById('winov').classList.remove('on'); }

        // ══════════════════════════
        // HISTORY
        // ══════════════════════════
        function addHistory() {
            roundId++;
            const t = new Date();
            histData.unshift({
                id: roundId,
                draws: [...draws],
                time: t,
                tickets: tickets.filter(t => t.locked && t.picks.size > 0).map(t => ({ picks: new Set(t.picks),
                    betAmt: t.betAmt, win: t.win, hits: t.hits, mult: t.mult }))
            });
        }

        function renderHistory() {
            const el = document.getElementById('histlist');
            if (!histData.length) { el.innerHTML = '<div class="empty">No drawing history yet.</div>'; return; }
            el.innerHTML = histData.map(h => {
                const ts =
                    `${String(h.time.getHours()).padStart(2,'0')}:${String(h.time.getMinutes()).padStart(2,'0')}:${String(h.time.getSeconds()).padStart(2,'0')}`;
                const numHtml = h.draws.map(n => `<div class="h-num">${n}</div>`).join('');
                return `<div class="h-row">
              <div class="h-top">
                <span style="color:var(--green);">Draw ID</span>
                <span style="font-weight:700;">${h.id}</span>
                <span style="color:var(--dim);margin-left:auto;">${ts}</span>
              </div>
              <div class="h-nums-grid">${numHtml}</div>
            </div>`;
            }).join('');
        }

        function renderResults() {
            const el = document.getElementById('reslist');
            if (!histData.length) { el.innerHTML =
                    '<div class="empty">Your ticket results will appear here after each round.</div>'; return; }
            el.innerHTML = histData.filter(h => h.tickets.length > 0).map(h => {
                const ts =
                    `${String(h.time.getHours()).padStart(2,'0')}:${String(h.time.getMinutes()).padStart(2,'0')}`;
                const ticketHtml = h.tickets.map((t, i) => {
                    const nums = [...t.picks].sort((a, b) => a - b);
                    const picks = nums.map(n =>
                        `<div class="rpn ${h.draws.includes(n)?'rw':''}">${n}</div>`).join('');
                    return `<div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:4px;padding:6px 8px;margin-bottom:3px;">
                <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px;">
                  <span style="color:var(--dim);">Ticket ${i+1}</span>
                  <span style="color:${t.win>0?'var(--green)':'var(--red)'};font-weight:700;">${t.win>0?'WIN':'LOSS'}</span>
                </div>
                <div class="res-picks">${picks}</div>
                <div style="display:flex;justify-content:space-between;font-size:9px;">
                  <span style="color:var(--dim);">Bet ${t.betAmt}</span>
                  <span style="color:${t.win>0?'var(--green)':'#555'};font-weight:700;">${t.win>0?'+'+fmt(t.win)+' ETB':'—'}</span>
                </div>
              </div>`;
                }).join('');
                return `<div class="res-round">
              <div class="res-round-hdr">
                <span class="res-round-id">Round #${h.id}</span>
                <span class="res-round-time">${ts}</span>
              </div>
              ${ticketHtml}
            </div>`;
            }).join('') || '<div class="empty">No ticket results yet.</div>';
        }

        function renderStats() {
            const el = document.getElementById('statslist');
            const totalDraws = histData.length;
            if (!totalDraws) { el.innerHTML = '<div class="empty">Play rounds to see number statistics.</div>'; return; }
            const allNums = [];
            for (let i = 1; i <= 80; i++) allNums.push({ n: i, count: statsMap[i] || 0, rate: ((statsMap[i] || 0) / (
                totalDraws * 20) * 100) });
            const sorted = [...allNums].sort((a, b) => b.count - a.count);
            const hotTop = sorted.slice(0, 10);
            const coldTop = sorted.slice(-10).reverse();
            const maxCount = sorted[0].count || 1;
            let html = `<div class="stats-section">
            <div class="stats-title hot">🔥 Hot Numbers</div>
            ${hotTop.map((x,i)=>`<div class="st-row"><span class="st-rank">${i+1}</span><div class="st-numball hot-ball">${x.n}</div><div class="st-bw"><div class="st-bar hot-bar" style="width:${(x.count/maxCount*100).toFixed(0)}%"></div></div><span class="st-count">${x.count}</span><span class="st-pct" style="color:#e74c3c">${x.rate.toFixed(1)}%</span></div>`).join('')}
          </div>`;
            html += `<div class="stats-section">
            <div class="stats-title cold">❄️ Cold Numbers</div>
            ${coldTop.map((x,i)=>`<div class="st-row"><span class="st-rank">${i+1}</span><div class="st-numball cold-ball">${x.n}</div><div class="st-bw"><div class="st-bar cold-bar" style="width:${maxCount>0?(x.count/maxCount*100).toFixed(0):0}%"></div></div><span class="st-count">${x.count}</span><span class="st-pct" style="color:var(--blue)">${x.rate.toFixed(1)}%</span></div>`).join('')}
          </div>`;
            const maxR = Math.max(...allNums.map(x => x.count), 1);
            html += `<div class="stats-section">
            <div class="stats-title rate">📊 All Numbers Rate</div>
            <div class="rate-grid">
              ${allNums.map(x=>{
                const pct=x.count/maxR;
                const r=Math.round(pct*200+30);
                const g=Math.round(40+pct*170);
                const b=Math.round(30);
                return `<div class="rate-cell" style="background:rgba(${r},${g},${b},0.75);border:1px solid rgba(${r},${g},${b},0.35);"><span class="rn">${x.n}</span><span class="rp">${x.rate.toFixed(0)}%</span></div>`;
              }).join('')}
            </div></div>`;
            el.innerHTML = html;
        }

        // ══════════════════════════
        // BET
        // ══════════════════════════
        const STEPS = [10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000];

        function cbet(d) {
            let i = STEPS.findIndex(s => Math.abs(s - bet) < 1);
            if (i < 0) i = STEPS.findIndex(s => s >= bet);
            if (i < 0) i = STEPS.length - 1;
            i = Math.max(0, Math.min(STEPS.length - 1, i + d));
            bet = STEPS[i];
            document.getElementById('betdisp').textContent = bet;
            if (tickets[activeIdx]) tickets[activeIdx].betAmt = bet;
            renderTickets();
        }

        function dobx2() { bet = Math.min(10000, bet * 2);
            document.getElementById('betdisp').textContent = bet; if (tickets[activeIdx]) tickets[activeIdx].betAmt = bet;
            renderTickets(); }

        function dobmax() { bet = Math.min(bal, 10000);
            document.getElementById('betdisp').textContent = bet; if (tickets[activeIdx]) tickets[activeIdx].betAmt = bet;
            renderTickets(); }

        // ══════════════════════════
        // TABS
        // ══════════════════════════
        function swTab(t) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('on'));
            document.querySelectorAll('.tabpane').forEach(pane => pane.classList.remove('on'));
            const tabBtn = document.querySelector(`.tab[data-t="${t}"]`);
            if (tabBtn) tabBtn.classList.add('on');
            const pane = document.getElementById('tp-' + t);
            if (pane) pane.classList.add('on');
        }

        // ══════════════════════════
        // INIT
        // ══════════════════════════
        initLeaders();
        renderLeaders();
        upBal();
        document.getElementById('betdisp').textContent = bet;
        createTicketSlot();
        startCountdown();
        updateDrawnNumbersRow();
    </script>
</body>
</html>
